# Заменяет @include common-auth в gdm-password.
# Лицо (сессия ok) → urblock-verify success=done до pam_unix (иначе pam_unix зависает на пустом пароле).
# Пароль → pam_unix success=done, если лицо не прошло.
# Оба не прошли → pam_deny.
auth	optional			pam_exec.so quiet /usr/local/bin/urblock-verify --preflight
auth	[success=done default=ignore]	pam_exec.so expose_authtok quiet /usr/local/bin/urblock-verify
auth	[success=done default=ignore]	pam_unix.so nullok
auth	[success=1 default=ignore]	pam_sss.so use_first_pass
auth	requisite			pam_deny.so
auth	required			pam_permit.so
auth	optional			pam_cap.so
